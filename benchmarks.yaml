- name: τ²-bench
  description: >-
    Evaluates agents in dual-control settings where both the agent and user modify shared state, exposing coordination and communication failures.
  category: general capabilities
  links:
    paper: https://arxiv.org/pdf/2506.07982
    github: https://github.com/sierra-research/tau2-bench
    website: https://taubench.com
    agentbeats: https://agentbeats.dev/agentbeater/tau2-bench

- name: OSWorld
  description: >-
    Evaluates multimodal agents on 369 real-world computer tasks across OS, web, and desktop apps.
  category: computer use
  links:
    paper: https://arxiv.org/abs/2404.07972
    github: https://github.com/xlang-ai/OSWorld
    website: https://os-world.github.io

- name: Terminal-Bench 1.0
  description: >-
    Evaluates agents' ability to use a computer terminal on ~100 tasks.
  category: computer use
  links:
    github: https://github.com/harbor-framework/terminal-bench
    website: https://www.tbench.ai

- name: Terminal-Bench 2.0
  description: >-
    Curated hard benchmark of 89 tasks in computer terminal environments, spanning software engineering, ML, security, and data science.
  category: computer use
  links:
    paper: https://arxiv.org/abs/2601.11868
    github: https://github.com/harbor-framework/terminal-bench-2
    website: https://www.tbench.ai
    agentbeats: https://agentbeats.dev/jngan00/terminal-bench-2-0-green-agent

- name: WebArena
  description: >-
    Evaluates agents on realistic web tasks spanning e-commerce, forums, collaborative software dev, and content management.
  category: web
  links:
    paper: https://arxiv.org/abs/2307.13854
    github: https://github.com/web-arena-x/webarena
    website: https://webarena.dev

- name: SWE-bench
  description: >-
    Evaluates agents' ability to resolve real GitHub issues by editing codebases, drawn from 2294 issues across 12 Python repositories.
  category: coding
  links:
    paper: https://arxiv.org/abs/2310.06770
    github: https://github.com/SWE-bench/SWE-bench
    website: https://www.swebench.com


